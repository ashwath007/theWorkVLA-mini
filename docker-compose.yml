version: "3.9"

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vla_pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_URL=postgresql://vla:vla@postgres:5432/vladb
    volumes:
      - vla_data:/data
      - vla_models:/models
      - ./src:/app/src
      - ./configs:/app/configs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: ankane/pgvector:latest
    container_name: vla_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vla
      POSTGRES_PASSWORD: vla
      POSTGRES_DB: vladb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vla -d vladb"]
      interval: 10s
      timeout: 5s
      retries: 5

  labelstudio:
    image: heartexlabs/label-studio:latest
    container_name: vla_labelstudio
    restart: unless-stopped
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    volumes:
      - labelstudio_data:/label-studio/data
      - vla_data:/label-studio/files:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  vla_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-/tmp/vla_data}
  vla_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MODEL_OUTPUT_DIR:-/tmp/vla_models}
  postgres_data:
  labelstudio_data:

networks:
  default:
    name: vla_network
